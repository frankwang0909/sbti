<!doctype html>
<html lang="zh-CN">
	<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NWYNWSLHDD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NWYNWSLHDD');

		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SBTI 所有人格类型一览表 | 吗喽、死者、尤物、小丑</title>

		<!-- SEO Meta Tags -->
		<meta
			name="description"
			content="全网最全 SBTI 类型解读：从'吗喽'到'死者'，从'尤物'到'ATM'。深入了解 16+ 种'精神发疯'人格，对照你的 MBTI 寻找灵魂伴侣。"
		/>
		<meta
			name="keywords"
			content="SBTI类型, SBTI人格, 吗喽, 死者人格, ATM人格, 尤物人格, 精神状态, MBTI对照表"
		/>

		<link rel="stylesheet" href="style.css" />
		<style>
			.type-card {
				background-color: var(--card-bg);
				border-radius: 16px;
				padding: 20px;
				text-align: left;
				border-left: 8px solid var(--sbti-orange);
				margin-bottom: 20px;
			}
			.type-header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 10px;
			}
			.type-name {
				font-size: 1.8rem;
				font-weight: bold;
			}
			.type-id {
				font-size: 0.9rem;
				color: var(--text-secondary);
			}
		</style>
	</head>
	<body>
		<div
			class="lang-switcher"
			style="position: absolute; top: 20px; right: 20px"
		>
			<button
				id="lang-btn"
				class="btn"
				style="
					width: auto;
					padding: 5px 15px;
					background: rgba(255, 255, 255, 0.1);
					font-size: 0.8rem;
					border: 1px solid rgba(255, 255, 255, 0.2);
					cursor: pointer;
					color: white;
					border-radius: 8px;
				"
			>
				English / 中文
			</button>
		</div>
		<div class="container" style="max-width: 800px; text-align: left">
			<h1 style="text-align: center; margin-bottom: 3rem">
				<span class="title-sbti">SBTI</span>
				<span id="ui-types-title">类型全集</span>
			</h1>

			<div class="types-disclaimer">
				<span class="disclaimer-num">1627</span>
				<span id="ui-disclaimer-text">种理论变体存在于平行宇宙中。我们只解锁了其中 8 种——因为剩下的 1619 种，研究员在写到第 9 种时精神状态已确诊为「死者」，无法继续。</span>
			</div>

			<div id="types-list">
				<!-- Dynamically loaded types -->
			</div>

			<div style="text-align: center; margin-top: 3rem">
				<a
					href="index.html"
					id="ui-back-btn"
					class="btn btn-primary"
					style="display: inline-block; width: auto; padding: 12px 30px"
					>返回测试</a
				>
			</div>
		</div>

		<script type="module">
			import { SBTI_TYPES } from './data.js';
			const list = document.getElementById('types-list');
			const langBtn = document.getElementById('lang-btn');
			let currentLang = 'zh';

			const UI_TEXT = {
				zh: { title: '类型全集', back: '返回测试', match: '匹配 MBTI: ' },
				en: { title: 'All Types', back: 'Back to Test', match: 'MBTI Match: ' },
			};

			function renderTypes() {
				list.innerHTML = '';
				const text = UI_TEXT[currentLang];
				document.getElementById('ui-types-title').textContent = text.title;
				document.getElementById('ui-back-btn').textContent = text.back;

				Object.entries(SBTI_TYPES).forEach(([key, type]) => {
					const card = document.createElement('div');
					card.className = 'type-card';
					card.style.borderLeftColor = type.color;

					card.innerHTML = `
                    <div class="type-header">
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <span style="font-size: 2.5rem;">${type.icon}</span>
                            <div class="type-name" style="color: ${type.color}">${type.name[currentLang]}</div>
                        </div>
                        <div class="type-id">${type.id}</div>
                    </div>
                    <div style="font-size: 0.8rem; background: var(--mbti-blue); display: inline-block; padding: 2px 8px; border-radius: 10px; margin-bottom: 10px;">
                        ${text.match}${type.mbti_match}
                    </div>
                    <p style="margin-bottom: 10px; font-weight: bold;">${type.description[currentLang]}</p>
                    <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 15px; border-left: 3px solid ${type.color}; padding-left: 10px;">${type.persona[currentLang]}</p>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        ${type.traits[currentLang].map((t) => `<span class="trait-tag" style="font-size: 0.7rem; padding: 3px 10px;">#${t}</span>`).join('')}
                    </div>
                `;
					list.appendChild(card);
				});
			}

			langBtn.addEventListener('click', () => {
				currentLang = currentLang === 'zh' ? 'en' : 'zh';
				renderTypes();
			});

			// Initial render
			renderTypes();
		</script>
	</body>
</html>
